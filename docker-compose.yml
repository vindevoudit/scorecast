services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: scorecast:local
    container_name: scorecast-app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Run as production so the prod-deps image (no pino-pretty, no swagger UI)
      # behaves correctly. This compose mirrors the Azure Container Apps prod
      # stack; for full-app dev work (login flows, hot reload), keep using
      # `node server.js` + `npm run dev` directly.
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/scorecast_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-only-jwt-secret-replace-in-prod-with-a-real-one-please}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      MIGRATE_ON_BOOT: 'true'
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - '3000:3000'
    restart: unless-stopped
    networks:
      - scorecast

  postgres:
    image: postgres:16-alpine
    container_name: scorecast-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: scorecast_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d scorecast_db']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - scorecast

  redis:
    image: redis:7-alpine
    container_name: scorecast-redis
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redisdata:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - scorecast

volumes:
  pgdata:
  redisdata:

networks:
  scorecast:
    driver: bridge
