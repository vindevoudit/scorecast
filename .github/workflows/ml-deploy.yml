name: ML Deploy

# Builds + pushes the scorecast-ml image when ml/** changes on main, then
# points the existing Container Apps Job at the new tag. No auto-trigger —
# the Job's Schedule (Thursdays 02:30 UTC, defined in infra/modules/ml-job.bicep)
# handles invocation. Operators can fire ad-hoc runs with:
#   az containerapp job start --name scorecast-ml-job --resource-group scorecast-prod

on:
  push:
    branches: [main]
    paths:
      - 'ml/**'
      - '.github/workflows/ml-deploy.yml'
  workflow_dispatch:

# Required for Azure OIDC federation (no long-lived secrets).
permissions:
  contents: read
  id-token: write

env:
  AZURE_RESOURCE_GROUP: scorecast-prod
  AZURE_ML_JOB: scorecast-ml-job
  ACR_NAME: scorecastacrp3aaelev7xp52
  ACR_LOGIN_SERVER: scorecastacrp3aaelev7xp52.azurecr.io
  IMAGE_REPO: scorecast-ml

jobs:
  build-and-push:
    name: Build + push ML image
    runs-on: ubuntu-latest
    # Training runs inside the Docker build (~30s for XGBoost on 12k matches).
    # 20 min cap leaves headroom for first-time deps pulls.
    timeout-minutes: 20
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name "$ACR_NAME"

      - name: Build + push image
        run: |
          set -euo pipefail
          IMAGE="$ACR_LOGIN_SERVER/$IMAGE_REPO:${{ steps.tag.outputs.tag }}"
          IMAGE_LATEST="$ACR_LOGIN_SERVER/$IMAGE_REPO:latest"
          docker build -t "$IMAGE" -t "$IMAGE_LATEST" -f ml/Dockerfile ml/
          docker push "$IMAGE"
          docker push "$IMAGE_LATEST"
          echo "Pushed $IMAGE"

  update-job:
    name: Point Container Apps Job at new image
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update Job image
        run: |
          set -euo pipefail
          IMAGE="$ACR_LOGIN_SERVER/$IMAGE_REPO:${{ needs.build-and-push.outputs.image_tag }}"
          az containerapp job update \
            --name "$AZURE_ML_JOB" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --image "$IMAGE" \
            --output none
          echo "Pointed $AZURE_ML_JOB at $IMAGE — next scheduled fire (Thursdays 02:30 UTC) will use it."
