<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Bantryx">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.3" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#06b6d4" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="pitchline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#67e8f9" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#67e8f9" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#67e8f9" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background + glow centered behind the B -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- B logo group: same path as public/logo.svg (already centered for a
       512 canvas), translated + scaled into the left third of the OG
       canvas. Original path bounding box: 127..385 × 110..416 → 258×306.
       Place at x=120, y=115, scale to ~1.3× so the B fills a ~336×398 box
       (centered vertically on the 630 canvas). -->
  <g transform="translate(35 17) scale(1.3)">
    <rect x="80" y="263" width="352" height="2" fill="url(#pitchline)"/>
    <path fill="url(#mark)" fill-rule="evenodd" d="
      M 127 110
      H 283
      C 335 110, 371 144, 371 196
      C 371 228, 353 252, 323 264
      C 359 274, 385 302, 385 340
      C 385 388, 347 416, 283 416
      H 127
      Z
      M 195 162
      V 240
      H 267
      C 293 240, 311 226, 311 202
      C 311 178, 293 162, 267 162
      Z
      M 195 290
      V 364
      H 275
      C 303 364, 323 350, 323 328
      C 323 304, 303 290, 275 290
      Z
    "/>
  </g>

  <!-- Wordmark + tagline on the right. Uses generic sans-serif font
       families because resvg-js doesn't load webfonts at rasterization
       time — Impact / Arial Narrow Bold are the closest universal
       fallbacks to the live Bebas Neue wordmark. -->
  <text x="560" y="315"
        font-family="Impact, 'Arial Narrow Bold', sans-serif"
        font-size="160"
        font-weight="bold"
        letter-spacing="6"
        fill="url(#mark)">BANTRYX</text>
  <text x="560" y="380"
        font-family="Inter, system-ui, sans-serif"
        font-size="32"
        font-weight="500"
        fill="#94a3b8"
        letter-spacing="1">Predict football. Climb the leaderboard.</text>
  <text x="560" y="430"
        font-family="Inter, system-ui, sans-serif"
        font-size="22"
        font-weight="400"
        fill="#475569"
        letter-spacing="1">bantryx.com</text>
</svg>
