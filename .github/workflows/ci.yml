name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

permissions:
  contents: read

jobs:
  lint-and-build:
    name: Lint, format, build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: '0'

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build frontend
        run: npm run build

  migrations-smoke:
    name: DB migrations smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: scorecast_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d scorecast_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/scorecast_test
      NODE_ENV: test
      HUSKY: '0'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply migrations
        run: npm run db:migrate

      - name: Roll back all migrations
        run: npm run db:migrate:undo:all

      - name: Re-apply migrations (idempotency check)
        run: npm run db:migrate

      - name: Verify migration status
        run: npm run db:migrate:status
