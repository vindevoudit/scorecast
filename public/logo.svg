<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Bantryx">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#06b6d4" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="pitchline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#67e8f9" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#67e8f9" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#67e8f9" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#glow)"/>

  <!-- Tier 20 Chunk 5 — athletic-motif "pitch line" accent. Subtle cyan
       horizontal stripe at the B's crossbar y-coordinate (y=263), fading
       from transparent at the edges to ~85% opacity in the middle. Reads
       as a horizon / pitch-line at large sizes; invisible at favicon
       sizes (16-32px) where 2px of stripe height vanishes into the
       cyan bowl pinch. Sits BEHIND the B (rendered first) so the
       letterform stays crisp. -->
  <rect x="80" y="263" width="352" height="2" fill="url(#pitchline)"/>

  <!-- Tier 20 Chunk 5 — B path centered on the 512 canvas. Original path
       spanned x ∈ [152, 410] (midpoint 281, 25px right of canvas center
       256). Shifted -25 in x so the B now spans x ∈ [127, 385] (midpoint
       256, true geometric centering). All other coordinates preserved
       exactly so the letterform is identical to the original — just
       repositioned. -->
  <path fill="url(#mark)" fill-rule="evenodd" d="
    M 127 110
    H 283
    C 335 110, 371 144, 371 196
    C 371 228, 353 252, 323 264
    C 359 274, 385 302, 385 340
    C 385 388, 347 416, 283 416
    H 127
    Z
    M 195 162
    V 240
    H 267
    C 293 240, 311 226, 311 202
    C 311 178, 293 162, 267 162
    Z
    M 195 290
    V 364
    H 275
    C 303 364, 323 350, 323 328
    C 323 304, 303 290, 275 290
    Z
  "/>
</svg>
